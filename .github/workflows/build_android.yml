name: Reusable Dive Build on Linux targetting Android

on:
  workflow_call:
    inputs:
      build_type:
        required: true
        type: string
      restore_cache:
        required: true
        type: boolean
      upload_cache:
        required: true
        type: boolean

jobs:
  build_device_linux:
    name: Build Device Linux ${{ inputs.build_type }}
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v5
        id: setup-java
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Check out code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install dependency
        run: |
          sudo apt-get update --yes
          # Request at least clang-tidy-19 to get run-clang-tidy -source-filter option
          sudo apt-get install --yes \
            ccache \
            clang-tidy-19 \
            cmake \
            libxcb-glx0-dev \
            ninja-build \
            python3-mako
      - uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        id: setup-ndk
        with:
          # TODO: b/504651150 - Prefer r30 (LTS) when it is relesed
          ndk-version: r29
          add-to-path: true
      - name: (ccache) Clear stats
        run: ccache -z
      - name: (ccache) Restore (restore_cache)
        if: ${{ inputs.restore_cache }}
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-android-${{ inputs.build_type }}-ccache-continuous-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-android-${{ inputs.build_type }}-ccache-continuous-
      - name: Build Dive device libraries with ninja
        run: |
          python -u scripts/build.py \
            --actions all_device \
            --build-type ${INPUTS_BUILD_TYPE} \
            --ci \
            --host-configure-additional-flags "\
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          INPUTS_BUILD_TYPE: ${{ inputs.build_type }}
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
      - name: Ninja log
        run: |
          cat build/device/.ninja_log
      - name: Run clang-tidy on changes
        run: |
          git fetch --no-tags --prune --no-recurse-submodules --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          python3 scripts/dive-run-clang-tidy.py --run_clang_tidy run-clang-tidy-19 --config_file .clang-tidy-ci git_diff "${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
      - name: (ccache) Show stats
        run: ccache -s
      - name: (ccache) Save (upload_cache)
        if: ${{ inputs.upload_cache }}
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-android-${{ inputs.build_type }}-ccache-continuous-${{ github.sha }}
