name: Reusable Dive Build on MacOs

on:
  workflow_call:
    inputs:
      build_type:
        required: true
        type: string
      restore_cache:
        required: true
        type: boolean
      upload_cache:
        required: true
        type: boolean

jobs:
  build_host_mac:
    name: Build Host Mac ${{ inputs.build_type }}
    runs-on: macos-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Qt 5.15 via Homebrew
        run: |
          brew install qt@5
          # Link it so standard commands might find it, or just set env vars below
          echo "Qt5_DIR=$(brew --prefix qt@5)/lib/cmake/Qt5" >> $GITHUB_ENV
          echo "PATH=$(brew --prefix qt@5)/bin:$PATH" >> $GITHUB_ENV
      - name: Check Qt Version
        run: qmake --version
      - name: Install Dive dependencies
        run: |
          python3 -m pip install --break-system-packages mako
      - name: Install presubmit check dependencies
        run: |
          brew install llvm
          echo "PATH=$(brew --prefix llvm)/bin:$PATH" >> $GITHUB_ENV
      - name: (ccache) Install via Homebrew
        run: brew install ccache
      - name: (ccache) Clear stats
        run: ccache -z
      - name: (ccache) Restore (restore_cache)
        if: ${{ inputs.restore_cache }}
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ inputs.build_type }}-ccache-continuous-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.build_type }}-ccache-continuous-
      - name: Build Dive host tools with ninja
        run: |
          python -u scripts/build.py \
            --actions configure_host,build_host,install_host \
            --build-type ${INPUTS_BUILD_TYPE} \
            --build-via-generator \
            --ci \
            --host-configure-additional-flags "\
              -DDIVE_BUILD_WITH_CRASHPAD=OFF \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
        env:
          INPUTS_BUILD_TYPE: ${{ inputs.build_type }}
      - name: Ninja log
        run: |
          cat build/host/.ninja_log
      - name: Run clang-tidy on changes
        run: |
          git fetch --no-tags --prune --no-recurse-submodules --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          python3 scripts/dive-run-clang-tidy.py --config_file .clang-tidy-ci git_diff "${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
      - name: Put files in app bundle
        run: |
          python scripts/deploy_mac_bundle.py --no-device-libraries --no-sign
      - name: Run tests
        run: |
          ctest --output-on-failure -C ${INPUTS_BUILD_TYPE} --test-dir build/host
        env:
          INPUTS_BUILD_TYPE: ${{ inputs.build_type }}
      - name: (ccache) Show stats
        run: ccache -s
      - name: (ccache) Save (upload_cache)
        if: ${{ inputs.upload_cache }}
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ inputs.build_type }}-ccache-continuous-${{ github.sha }}
